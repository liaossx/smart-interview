name: CI

# ========== 触发条件 ==========
# push 到 main/master 分支时触发
# 有人提 Pull Request 时也触发
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ========== 并发控制 ==========
# 同一分支的新 push 会取消旧的正在跑的 CI，节省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== 后端测试 ==========
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 编译 + 跑测试
        working-directory: backend
        run: mvn test --no-transfer-progress -B

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/target/surefire-reports/

  # ========== AI 服务检查 ==========
  ai-service:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: 安装依赖
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: 语法检查
        working-directory: ai-service
        run: python -m py_compile app/main.py
